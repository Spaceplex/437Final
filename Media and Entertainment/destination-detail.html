<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Destination Detail - Media & Content</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="title-row">
        <h1>Media & Content</h1>
        <a href="index.html" class="play-btn">
          <div class="play-icon">&#9654;</div>
        </a>
      </div>
      <hr>
    </header>

    <div class="dest-hero">
      <button class="hero-arrow hero-arrow-left">&#9664;</button>
      <button class="hero-arrow hero-arrow-right">&#9654;</button>
    </div>

    <div class="dest-info-layout">
      <div class="dest-info-left">
        <div class="action-row">
          <button class="icon-btn star-btn">&#9733;</button>
          <button class="icon-btn bookmark-btn">&#128278;</button>
          <span class="section-label">Information</span>
        </div>
        <div class="info-rect"></div>
      </div>

      <div class="dest-info-right">
        <span class="section-label">Reviews</span>
        <div class="review-item">
          <div class="review-square"></div>
          <div class="review-thin"></div>
        </div>
        <div class="review-item">
          <div class="review-square"></div>
          <div class="review-thin"></div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>

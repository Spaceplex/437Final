<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Destinations - Media & Content</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="title-row">
        <h1>Media & Content</h1>
        <a href="index.html" class="play-btn">
          <div class="play-icon">&#9654;</div>
        </a>
      </div>
      <hr>
    </header>

    <div class="dest-layout">
      <div class="dest-main">
        <section class="carousel-section">
          <h2 class="carousel-title">DESTINATION ATTRACTIONS</h2>
          <div class="carousel">
            <div class="carousel-track">
              <a href="destination-detail.html" class="carousel-card"></a>
              <a href="destination-detail.html" class="carousel-card"></a>
              <a href="destination-detail.html" class="carousel-card"></a>
              <a href="destination-detail.html" class="carousel-card"></a>
              <a href="destination-detail.html" class="carousel-card"></a>
              <a href="destination-detail.html" class="carousel-card"></a>
            </div>
            <button class="carousel-arrow">&#9654;</button>
          </div>
        </section>

        <section class="carousel-section">
          <h2 class="carousel-title">YOUR FAVORITES</h2>
          <div class="carousel">
            <div class="carousel-track">
              <a href="destination-detail.html" class="carousel-card"></a>
              <a href="destination-detail.html" class="carousel-card"></a>
              <a href="destination-detail.html" class="carousel-card"></a>
              <a href="destination-detail.html" class="carousel-card"></a>
              <a href="destination-detail.html" class="carousel-card"></a>
              <a href="destination-detail.html" class="carousel-card"></a>
            </div>
            <button class="carousel-arrow">&#9654;</button>
          </div>
        </section>

        <section class="carousel-section">
          <h2 class="carousel-title">OUR RECOMMENDATIONS</h2>
          <div class="carousel">
            <div class="carousel-track">
              <a href="destination-detail.html" class="carousel-card"></a>
              <a href="destination-detail.html" class="carousel-card"></a>
              <a href="destination-detail.html" class="carousel-card"></a>
              <a href="destination-detail.html" class="carousel-card"></a>
              <a href="destination-detail.html" class="carousel-card"></a>
              <a href="destination-detail.html" class="carousel-card"></a>
            </div>
            <button class="carousel-arrow">&#9654;</button>
          </div>
        </section>
      </div>

      <div class="dest-sidebar">
        <h2 class="carousel-title">TRENDING</h2>
        <div class="vert-scroll">
          <div class="vert-col">
            <div class="vert-card"></div>
            <div class="vert-card"></div>
            <div class="vert-card"></div>
            <div class="vert-card"></div>
            <div class="vert-card"></div>
          </div>
          <div class="vert-col">
            <div class="vert-card"></div>
            <div class="vert-card"></div>
            <div class="vert-card"></div>
            <div class="vert-card"></div>
            <div class="vert-card"></div>
          </div>
        </div>
        <button class="vert-arrow">&#9660;</button>
      </div>
    </div>
  </div>

  <script>
    document.querySelectorAll('.carousel').forEach(carousel => {
      const track = carousel.querySelector('.carousel-track');
      const arrow = carousel.querySelector('.carousel-arrow');
      arrow.addEventListener('click', () => {
        track.scrollBy({ left: 200, behavior: 'smooth' });
      });
    });

    document.querySelector('.vert-arrow')?.addEventListener('click', () => {
      const scroll = document.querySelector('.vert-scroll');
      if (scroll) scroll.scrollBy({ top: 200, behavior: 'smooth' });
    });
  </script>
</body>
</html>
